version: "3.8"

networks:
  thmar-apps:
    external: true # الربط على شبكة الأودو الخارجية

volumes:
  pgadmin-data:

services:
  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "5050:80"
    networks:
      - thmar-apps
    volumes:
      - pgadmin-data:/var/lib/pgadmin