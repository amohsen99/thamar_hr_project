[options]
; ===============================
;  Odoo Configuration
; ===============================

; Addons paths
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/enterprise_addons,/mnt/thamar_hr_project

; Database configuration
db_host = pg-db
db_port = 5432
db_user = odoo19
db_password = odoo19
# dbfilter = ^%d
# db_name = testing

; Admin password
admin_passwd = Hit*man@25

; Disable demo data
without_demo = True

; Developer mode
dev_mode = false
log_level = info

; ===============================
;  Network / HTTP Config
; ===============================
proxy_mode = True
xmlrpc_port = 8090
longpolling_port = 8072

; ===============================
;  Performance Limits
; ===============================
workers = 3
max_cron_threads = 2
limit_memory_soft = 1073741824
limit_memory_hard = 1342177280
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
; ===============================
;  Logging
; ===============================
; Best practice in Docker — log to stdout so Docker captures logs
; logfile = /var/log/odoo/odoo.log
